spring:
  application:
    name: yahoo
  datasource:
    url: jdbc:postgresql://localhost:5432/yahoo_back_up
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update   # create | update | validate | none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  spring:
    data:
      redis:
        host: localhost
        port: 6379