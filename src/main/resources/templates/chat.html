<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}" lang="en">

<!-- Extra CSS for this page only -->
<th:block layout:fragment="extraHead">
    <link rel="stylesheet" th:href="@{/css/chat.css}">
</th:block>

<body>
<div layout:fragment="content">
    <div class="chat-page-container">
        <!-- Users Sidebar -->
        <aside class="chat-sidebar">
            <div class="sidebar-header">
                <h2>Users</h2>
                <div class="search-container">
                    <input type="text" id="user-search-input" placeholder="Search for users..." autocomplete="off">
                </div>
            </div>

            <div id="search-results-container" class="search-results" style="display: none;">
                <!-- Search results will populate here -->
            </div>

            <h3 id="active-users-heading" style="margin: 1rem 1rem 0 1rem; font-size: 0.8rem; text-transform: uppercase; color: var(--text-secondary);">Active Users</h3>
            <ul class="user-list" id="active-users-list">
                <li class="user-item"
                    th:each="conv : ${privateConversations}"
                    th:data-username="${conv.otherUserUsername}"
                    th:data-conversation-id="${conv.conversationId}"
                    th:data-other-user-id="${conv.otherUserId}"
                    onclick="selectUser(this.dataset.username, this.dataset.conversationId , this.dataset.otherUserId)">

                    <div class="avatar">Y</div>
                    <div>
                        <div class="user-name" th:text="${conv.otherUserFirstName() + ' ' + conv.otherUserLastName()}"></div>
                        <div style="font-size: 0.7rem; color: #4caf50;">Online</div>
                    </div>
                </li>


            </ul>

            <div style="display: flex; justify-content: space-between; align-items: center; margin: 1.5rem 1rem 0 1rem;">
                <h3 id="groups-heading" style="font-size: 0.8rem; text-transform: uppercase; color: var(--text-secondary); margin: 0;">Groups</h3>
                <button id="new-group-btn" title="Create New Group" style="background: none; border: none; color: var(--accent-primary); cursor: pointer; padding: 0.2rem;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </div>
            <ul class="user-list" id="groups-list">
                <li class="user-item"
                    th:each="group : ${groupConversations}"
                    th:data-group-name="${group.name}"
                    th:data-conversation-id="${group.id}"
                    onclick="selectGroup(this.dataset.groupName, this.dataset.conversationId)">

                    <div class="avatar">G</div>
                    <div>
                        <div class="user-name" th:text="${group.name}"></div>
                        <div style="font-size: 0.7rem; color: var(--text-secondary);" th:text="${group.participantCount + ' members'}"></div>
                    </div>
                </li>
            </ul>
        </aside>

        <!-- Chat Area -->
        <section class="chat-main">
            <header class="chat-header">
                <div class="avatar">Y</div>
                <div>
                    <h3 id="chat-header-title" style="font-size: 1rem;">Yahoo Support</h3>
                    <span id="chat-header-status" style="font-size: 0.7rem; color: #4caf50;">Online</span>
                </div>
                <div id="group-actions" style="margin-left: auto; display: none;">
                    <button id="add-member-btn" title="Add Member" style="background: var(--bg-secondary); border: 1px solid var(--border-color); color: var(--text-primary); cursor: pointer; padding: 0.4rem 0.8rem; border-radius: 8px; font-size: 0.8rem; display: flex; align-items: center; gap: 0.5rem;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
                        Add Friend
                    </button>
                </div>
            </header>

            <div class="messages-container" id="messages">
<!--                <div class="message message-received">-->
<!--                    Welcome to the new Yahoo Chat! How can I help you today?-->
<!--                    <span class="message-info">10:00 AM</span>-->
<!--                </div>-->
<!--                <div class="message message-sent">-->
<!--                    Hi! I love the new premium look. It looks amazing!-->
<!--                    <span class="message-info">10:05 AM</span>-->
<!--                </div>-->
<!--                <div class="message message-received">-->
<!--                    Thank you! We've worked hard on the design. Feel free to explore all the features.-->
<!--                    <span class="message-info">10:06 AM</span>-->
<!--                </div>-->
            </div>

            <div class="chat-input-area">
                <form id="chatForm" class="input-wrapper">
                    <input type="text" class="chat-input" placeholder="Type a message..." aria-label="Message input">
                    <button type="submit" class="send-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </form>
            </div>
        </section>
    </div>

    <!-- Create Group Modal -->
    <div id="create-group-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Create New Group</h3>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="group-name-input">Group Name</label>
                    <input type="text" id="group-name-input" placeholder="Enter group name...">
                </div>
                <div class="form-group">
                    <label>Select Friends</label>
                    <div id="friends-selection-list" class="selection-list">
                        <!-- Friends will be loaded here -->
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="cancel-group-btn" class="btn-secondary">Cancel</button>
                <button id="confirm-create-group-btn" class="btn-primary">Create Group</button>
            </div>
        </div>
    </div>

    <!-- Add Member Modal -->
    <div id="add-member-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add Friend to Group</h3>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div id="add-friends-list" class="selection-list">
                    <!-- Friends not in group will be loaded here -->
                </div>
            </div>
            <div class="modal-footer">
                <button id="confirm-add-member-btn" class="btn-primary">Add Selected</button>
            </div>
        </div>
    </div>
</div>

<!-- Extra JS for this page only -->
<th:block layout:fragment="extraScripts">
    <!-- Inline script for simple demo functionality if chat.js is missing -->

    <!--   web socket script    -->

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>



    <script>
        let stompClient = null;
        let currentConversationId = null; // group chat
        let currentReceiver = null;       // private chat
        let currentReceiverId = null;     // private chat receiver ID (optional, can be resolved by server)
        let currentUsername = "[[${#authentication.name}]]";
        let currentUserId   =  Number([[${#authentication.principal.id}]]);
        let privateConversation = false;

        function connect() {
            const socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);

            stompClient.connect(
            { username: currentUsername },
            function () {
                console.log("Connected");

                stompClient.subscribe('/user/queue/messages', function (message) {
                    showMessage(JSON.parse(message.body));
                });

            });
        }

        function subscribeToConversation(conversationId) {

            currentConversationId = conversationId;
            currentReceiver = null;

            stompClient.subscribe(
                '/topic/conversation/' + conversationId,
                function (message) {
                    showMessage(JSON.parse(message.body));
                }
            );

            clearMessages();
        }

   function selectUser(username, conversationId = null, otherUserId = null,private=true) {
            currentReceiver = username;
            currentConversationId = conversationId;
            currentReceiverId = otherUserId ? Number(otherUserId) : null; // will be resolved by server
            privateConversation = private;

            document.getElementById('chat-header-title').innerText = username;
            clearMessages();

            if (conversationId) {
                loadHistoryByConversation(conversationId);
            } else {
                fetch(`/chat-api/conversation/resolve?with=${encodeURIComponent(username)}`)
                    .then(res => res.json())
                    .then(data => loadHistoryByConversation(data.conversationId))
                    .catch(err => console.error('Failed to resolve conversation:', err));
            }
        }

        function selectGroup(groupName, conversationId) {
            currentReceiver = null;
            currentConversationId = conversationId;
            currentReceiverId = null;
            privateConversation = false;

             console.log("Group clicked:", groupName, conversationId);

            document.getElementById('chat-header-title').innerText = groupName;
            document.getElementById('chat-header-status').innerText = 'Group Chat';
            document.getElementById('group-actions').style.display = 'block';
            
            clearMessages();
            console.log('Subscribing to group conversation:', conversationId);
            subscribeToConversation(conversationId);
            loadHistoryByConversation(conversationId);
        }

        function loadHistoryByConversation(conversationId) {
            fetch(`/messages?conversationId=${conversationId}`)
                .then(res => res.json())
                .then(messages => messages.forEach(msg => showMessage(msg)))
                .catch(err => console.error('Failed to load history:', err));
        }

       function sendMessage(content) {
            // 🟢 GROUP MESSAGE
            if (!privateConversation) {
                stompClient.send("/app/chat.send", {}, JSON.stringify({
                    content: content,
                    senderUsername: currentUsername,
                    conversationId: currentConversationId,
                    Group: true
                }));
            }   

            // 🔵 PRIVATE MESSAGE
            else if (privateConversation) {
                stompClient.send("/app/chat.send", {}, JSON.stringify({
                    content: content,
                    senderId: currentUserId,
                    conversationId: currentConversationId,
                    receiverId: currentReceiverId, // server will resolve based on username
                    senderUsername: currentUsername,
                    receiverUsername: currentReceiver,
                    Group: false
                }));
            } else {
                alert("Select user or conversation first");
            }
        }

        function showMessage(message) {

            const messagesContainer = document.getElementById('messages');

            const msgDiv = document.createElement('div');

            if (message.senderId === currentUserId) {
                msgDiv.className = 'message message-sent';
            } else {
                msgDiv.className = 'message message-received';
            }

            const senderInfo = !privateConversation && message.senderId !== currentUserId 
                ? `<div class="message-sender">${message.senderUsername || 'User'}</div>` 
                : '';

            msgDiv.innerHTML = `
                ${senderInfo}
                <div class="message-content">${message.content}</div>
                <span class="message-info">${message.createdAt}</span>
            `;

            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // clear chat area when switching conversations or users
        function clearMessages() {
            document.getElementById('messages').innerHTML = '';
        }


       document.addEventListener('DOMContentLoaded', () => {
            connect();

            const chatForm = document.getElementById('chatForm');
            const input = chatForm.querySelector('input');

            chatForm.addEventListener('submit', (e) => {
                e.preventDefault();

                if (input.value.trim()) {
                    sendMessage(input.value);
                    input.value = '';
                }
            });

            // User Search Logic
            const searchInput = document.getElementById('user-search-input');
            const searchResultsContainer = document.getElementById('search-results-container');
            const activeUsersList = document.getElementById('active-users-list');
            const activeUsersHeading = document.getElementById('active-users-heading');

            let searchTimeout = null;

            searchInput.addEventListener('input', (e) => {
                const keyword = e.target.value.trim();

                clearTimeout(searchTimeout);

                if (keyword === '') {
                    searchResultsContainer.style.display = 'none';
                    activeUsersList.style.display = 'block';
                    activeUsersHeading.style.display = 'block';
                    return;
                }

                searchTimeout = setTimeout(() => {
                    fetch(`/chat-api/users/search?keyword=${encodeURIComponent(keyword)}`)
                        .then(response => response.json())
                        .then(users => {
                            displaySearchResults(users);
                        })
                        .catch(error => console.error('Error searching users:', error));
                }, 300); // debounce 300ms
            });

            function displaySearchResults(users) {
                searchResultsContainer.innerHTML = '';
                activeUsersList.style.display = 'none';
                activeUsersHeading.style.display = 'none';
                searchResultsContainer.style.display = 'flex';
                searchResultsContainer.style.flexDirection = 'column';

                if (users.length === 0) {
                    searchResultsContainer.innerHTML = '<div style="padding: 1.5rem; text-align: center; color: var(--text-secondary);">No users found.</div>';
                    return;
                }

                users.forEach(user => {
                    const item = document.createElement('div');
                    item.className = 'search-result-item';
                    item.innerHTML = `
                        <div class="user-info">
                            <div class="avatar">${user.username.charAt(0).toUpperCase()}</div>
                            <div class="details">
                                <div class="user-name">${user.username}</div>
                                <div class="user-full-name" style="font-size: 0.75rem; color: var(--text-secondary);">${(user.firstName || '') + ' ' + (user.lastName || '')}</div>
                            </div>
                        </div>
                        <button class="add-friend-btn" onclick="sendFriendRequest(this, '${user.username}')">Add Friend</button>
                    `;
                    searchResultsContainer.appendChild(item);
                });
            }

            window.sendFriendRequest = function(btn, username) {
                btn.disabled = true;
                btn.innerText = 'Sending...';

                fetch(`/chat-api/friends/request?receiverUsername=${encodeURIComponent(username)}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                })
                .then(async response => {
                    if (response.ok) {
                        btn.innerText = 'Request Sent';
                        btn.classList.add('success');
                    } else {
                        const err = await response.json();
                        alert('Error: ' + err.error);
                        btn.disabled = false;
                        btn.innerText = 'Add Friend';
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    btn.disabled = false;
                    btn.innerText = 'Add Friend';
                });
            };

            // Group Modal Logic
            const newGroupBtn = document.getElementById('new-group-btn');
            const createGroupModal = document.getElementById('create-group-modal');
            const friendsSelectionList = document.getElementById('friends-selection-list');
            const confirmCreateGroupBtn = document.getElementById('confirm-create-group-btn');
            const groupNameInput = document.getElementById('group-name-input');

            newGroupBtn.addEventListener('click', () => {
                loadFriends(friendsSelectionList);
                createGroupModal.style.display = 'flex';
            });

            document.querySelectorAll('.close-modal, .btn-secondary').forEach(btn => {
                btn.addEventListener('click', () => {
                    createGroupModal.style.display = 'none';
                    document.getElementById('add-member-modal').style.display = 'none';
                });
            });

            function loadFriends(container, excludeIds = []) {
                container.innerHTML = '<div style="padding: 1rem; text-align: center;">Loading friends...</div>';
                fetch('/chat-api/friends')
                    .then(res => res.json())
                    .then(friends => {
                        container.innerHTML = '';
                        if (friends.length === 0) {
                            container.innerHTML = '<div style="padding: 1rem; text-align: center; color: var(--text-secondary);">No friends found. Add some friends first!</div>';
                            return;
                        }
                        friends.forEach(friend => {
                            if (excludeIds.includes(friend.id)) return;
                            const item = document.createElement('div');
                            item.className = 'selection-item';
                            item.innerHTML = `
                                <input type="checkbox" id="friend-${friend.id}" value="${friend.id}">
                                <label for="friend-${friend.id}">
                                    <div class="avatar">${friend.username.charAt(0).toUpperCase()}</div>
                                    <div class="user-name">${friend.username}</div>
                                </label>
                            `;
                            container.appendChild(item);
                        });
                    });
            }

            confirmCreateGroupBtn.addEventListener('click', () => {
                const name = groupNameInput.value.trim();
                const selectedIds = Array.from(friendsSelectionList.querySelectorAll('input:checked')).map(cb => parseInt(cb.value));

                if (!name) { alert('Please enter a group name'); return; }
                if (selectedIds.length === 0) { alert('Please select at least one friend'); return; }

                fetch('/chat-api/groups', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, participantIds: selectedIds })
                })
                .then(res => res.json())
                .then(data => {
                    location.reload(); // Simple way to refresh lists
                })
                .catch(err => console.error('Failed to create group:', err));
            });

            // Add Member Logic
            const addMemberBtn = document.getElementById('add-member-btn');
            const addMemberModal = document.getElementById('add-member-modal');
            const addFriendsList = document.getElementById('add-friends-list');
            const confirmAddMemberBtn = document.getElementById('confirm-add-member-btn');

            addMemberBtn.addEventListener('click', () => {
                // For simplicity, we just load all friends. Ideally, filter those already in group.
                loadFriends(addFriendsList);
                addMemberModal.style.display = 'flex';
            });

            confirmAddMemberBtn.addEventListener('click', () => {
                const selectedIds = Array.from(addFriendsList.querySelectorAll('input:checked')).map(cb => parseInt(cb.value));
                
                if (selectedIds.length === 0) { alert('Please select at least one friend'); return; }

                const promises = selectedIds.map(userId => {
                    return fetch(`/chat-api/groups/${currentConversationId}/participants`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: userId })
                    });
                });

                Promise.all(promises)
                    .then(() => {
                        location.reload();
                    })
                    .catch(err => console.error('Failed to add members:', err));
            });
        });
    </script>




</th:block>
</body>
</html>
