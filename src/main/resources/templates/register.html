<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yahoo Registration - Create Your Account</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #410093 0%, #6001d2 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --text-main: #2d333a;
            --text-muted: #626971;
            --input-border: #e0e4e9;
            --input-focus: #6001d2;
            --yahoo-purple: #6001d2;
            --error-red: #d93025;
            --success-green: #188038;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--primary-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            color: var(--text-main);
            position: relative;
            overflow-x: hidden;
        }

        .bubble {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            filter: blur(80px);
            z-index: 0;
            animation: move 20s infinite alternate linear;
        }

        .bubble-1 { top: -100px; left: -100px; }
        .bubble-2 { bottom: -100px; right: -100px; animation-delay: -5s; }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 50px); }
        }

        .register-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
        }

        .register-container {
            background: var(--glass-bg);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(10px);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-section h1 {
            color: var(--yahoo-purple);
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1d2129;
            text-align: center;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 15px;
            text-align: center;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
            font-weight: 500;
            display: none;
        }

        .alert-error {
            background: #fff0f0;
            color: var(--error-red);
            border: 1px solid #fecaca;
        }

        .alert-success {
            background: #e6f4ea;
            color: var(--success-green);
            border: 1px solid #ceead6;
        }

        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 10px;
        }

        .input-group {
            flex: 1;
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #4b5563;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--input-border);
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.2s ease;
            background: #f9fafb;
            color: var(--text-main);
            outline: none;
        }

        input:focus {
            border-color: var(--input-focus);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(96, 1, 210, 0.1);
        }

        button {
            width: 100%;
            background: var(--yahoo-purple);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background: #410093;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(96, 1, 210, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
        }

        .footer a {
            color: var(--yahoo-purple);
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .form-row {
                flex-direction: column;
                gap: 0;
            }
            .register-container {
                padding: 32px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="bubble bubble-1"></div>
    <div class="bubble bubble-2"></div>

    <div class="register-wrapper">
        <div class="register-container">
            <div class="logo-section">
                <h1>YAHOO!</h1>
            </div>

            <h2>Create account</h2>
            <p class="subtitle">Join the Yahoo community today</p>

            <div id="alertBox" class="alert"></div>

            <form id="registerForm">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required autofocus>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label for="first_name">First Name</label>
                        <input type="text" id="first_name" name="first_name" placeholder="First name">
                    </div>
                    <div class="input-group">
                        <label for="last_name">Last Name</label>
                        <input type="text" id="last_name" name="last_name" placeholder="Last name">
                    </div>
                </div>

                <div class="input-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" placeholder="name@example.com" required>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Min. 6 characters" required minlength="6">
                    </div>
                    <div class="input-group">
                        <label for="confirm_password">Confirm Password</label>
                        <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat password" required>
                    </div>
                </div>

                <button type="submit" id="submitBtn">Create Account</button>
            </form>

            <div class="footer">
                <p>Already have an account? <a href="/user/login">Sign in</a></p>
                <div style="margin-top: 20px; font-size: 12px; opacity: 0.6;">
                    &copy; 2025 Yahoo Inc.
                </div>
            </div>
        </div>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const alertBox = document.getElementById('alertBox');
        const submitBtn = document.getElementById('submitBtn');

        function showAlert(message, type = 'error') {
            alertBox.textContent = message;
            alertBox.className = `alert alert-${type}`;
            alertBox.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(registerForm);
            const data = Object.fromEntries(formData.entries());
            
            // Basic client-side validation
            if (data.password !== data.confirm_password) {
                showAlert('Passwords do not match.');
                return;
            }

            if (data.password.length < 6) {
                showAlert('Password must be at least 6 characters.');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating account...';
            alertBox.style.display = 'none';

            try {
                // Since this is for a JSON request to /auth/register
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    showAlert('Account created successfully! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = '/user/login';
                    }, 2000);
                } else {
                    // Handle validation errors from the server
                    // The backend returns ApiResponse<RegisterResponse> which might have a message
                    const errorMessage = result.message || 'Registration failed. Please check your details.';
                    showAlert(errorMessage);
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Create Account';
                }
            } catch (error) {
                console.error('Registration error:', error);
                showAlert('An error occurred. Please try again later.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
