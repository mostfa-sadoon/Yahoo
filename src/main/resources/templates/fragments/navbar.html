<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
<header th:fragment="navbar" class="navbar">
    <div class="navbar-left">
        <a th:href="@{/}" class="logo">YAHOO!</a>
        <nav class="nav-links">
            <a th:href="@{/chat}" class="nav-link"
               th:classappend="${currentPage == 'chat'} ? ' active'">
               <span class="icon">💬</span> Chat
            </a>
            <a th:href="@{/news}" class="nav-link"
               th:classappend="${currentPage == 'news'} ? ' active'">
               <span class="icon">📰</span> News
            </a>
            <a th:href="@{/profile}" class="nav-link"
               th:classappend="${currentPage == 'profile'} ? ' active'">
               <span class="icon">👤</span> Profile
            </a>
        </nav>
    </div>
    <div class="navbar-right">
        
        <div class="notification-container" id="nav-notifications" th:if="${#authentication != null && #authentication.name != 'anonymousUser'}">
            <div class="notification-icon" onclick="toggleNotificationDropdown()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
                <span class="badge" id="notification-badge" style="display: none;">0</span>
            </div>
            
            <div class="dropdown-menu" id="notification-dropdown">
                <div class="dropdown-header">
                    <h4>Friend Requests</h4>
                </div>
                <div class="dropdown-content" id="notification-list">
                    <div style="padding: 1rem; text-align: center; color: var(--text-secondary); font-size: 0.85rem;">Loading...</div>
                </div>
            </div>
        </div>

        <div style="display:flex; align-items:center; gap:12px;"
             th:if="${#authentication != null && #authentication.name != 'anonymousUser'}">
            <div class="avatar"
                 th:text="${#authentication.name.substring(0,1).toUpperCase()}">U</div>
            <span class="user-name" th:text="${#authentication.name}">User</span>
        </div>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn">Sign Out</button>
        </form>
    </div>
</header>

<script th:if="${#authentication != null && #authentication.name != 'anonymousUser'}">
    document.addEventListener("DOMContentLoaded", function() {
        console.log("Navbar script initialized");
        window.loadPendingRequests();
    });

    window.toggleNotificationDropdown = function() {
        console.log("Toggling notification dropdown...");
        const dropdown = document.getElementById("notification-dropdown");
        if (!dropdown) {
            console.error("Could not find notification-dropdown element");
            return;
        }
        dropdown.classList.toggle("show");
        if(dropdown.classList.contains("show")){
            window.loadPendingRequests();
        }
    };

    window.addEventListener('click', function(event) {
        if (!event.target.closest('.notification-container')) {
            const dropdown = document.getElementById('notification-dropdown');
            if (dropdown && dropdown.classList.contains('show')) {
                dropdown.classList.remove('show');
            }
        }
    });

    window.loadPendingRequests = function() {
        console.log("Fetching pending friend requests...");
        fetch('/chat-api/friends/pending')
            .then(res => {
                if (!res.ok) {
                    throw new Error(`HTTP error! status: ${res.status}`);
                }
                return res.json();
            })
            .then(data => {
                console.log("Successfully fetched requests:", data);
                const badge = document.getElementById("notification-badge");
                const list = document.getElementById("notification-list");
                
                if (badge) {
                    if (data.length > 0) {
                        badge.innerText = data.length;
                        badge.style.display = 'flex';
                    } else {
                        badge.style.display = 'none';
                    }
                }

                if (!list) {
                    console.error("Could not find notification-list element");
                    return;
                }

                list.innerHTML = '';
                if (data.length === 0) {
                    list.innerHTML = '<div style="padding: 1.5rem; text-align: center; color: var(--text-secondary); font-size: 0.85rem;">No pending requests</div>';
                    return;
                }

                data.forEach(req => {
                    if (!req.sender) {
                        console.warn("Friend request missing sender info:", req);
                        return;
                    }
                    const item = document.createElement('div');
                    item.className = 'friend-request-item';
                    item.innerHTML = `
                        <div class="requester-info">
                            <div class="avatar-small">${(req.sender.username || '?').charAt(0).toUpperCase()}</div>
                            <div class="requester-details">
                                <span class="req-username">${req.sender.username || 'Unknown'}</span>
                                <span class="req-fullname">${req.sender.firstName || ''} ${req.sender.lastName || ''}</span>
                            </div>
                        </div>
                        <div class="request-actions">
                            <button class="btn-accept" title="Accept" onclick="handleRequest(${req.id}, 'accept', this)">✓</button>
                            <button class="btn-reject" title="Reject" onclick="handleRequest(${req.id}, 'reject', this)">✕</button>
                        </div>
                    `;
                    list.appendChild(item);
                });
            })
            .catch(err => {
                console.error("Error loading requests:", err);
                const list = document.getElementById("notification-list");
                if (list) {
                    list.innerHTML = '<div style="padding: 1rem; text-align: center; color: #ff3b3b; font-size: 0.85rem;">Failed to load requests</div>';
                }
            });
    };

    window.handleRequest = function(requestId, action, btnElement) {
        console.log(`Processing ${action} for request ${requestId}...`);
        const item = btnElement.closest('.friend-request-item');
        if (item) item.style.opacity = '0.5';
        btnElement.disabled = true;
        
        fetch(`/chat-api/friends/${action}?requestId=${requestId}`, { method: 'POST' })
            .then(res => {
                if(res.ok) {
                    console.log(`Request ${requestId} ${action}ed successfully`);
                    if (item) item.remove();
                    window.loadPendingRequests();
                } else {
                    throw new Error(`Failed to ${action} request`);
                }
            })
            .catch(err => {
                console.error(`Error ${action}ing request:`, err);
                if (item) item.style.opacity = '1';
                btnElement.disabled = false;
                alert(`Error processing ${action} request.`);
            });
    };
</script>

</body>
</html>
